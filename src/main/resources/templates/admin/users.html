<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FinSync - Администрирование</title>
    <link rel="stylesheet" th:href="@{/style.css}" href="/style.css">
    <style>
        .admin-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
        .admin-table th { background: #3949ab; color: #fff; padding: 12px 16px; font-size: 13px; font-weight: 600; text-align: left; }
        .admin-table td { padding: 11px 16px; font-size: 13px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
        .admin-table tr:last-child td { border-bottom: none; }
        .admin-table tr:hover td { background: #f5f7ff; }
        .role-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
        .role-admin { background: #fde8e8; color: #c0392b; }
        .role-user  { background: #e8eaf6; color: #3949ab; }
        .verified-yes { color: #27ae60; font-size: 12px; }
        .verified-no  { color: #999;     font-size: 12px; }
        .row-actions { display: flex; gap: 8px; align-items: center; }
        .row-actions select { font-size: 12px; padding: 3px 6px; border: 1px solid #ccc; border-radius: 4px; }
        .btn-ok  { font-size: 12px; padding: 3px 10px; background: #3949ab; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        .btn-ok:hover  { background: #303f9f; }
        .btn-del { font-size: 12px; padding: 3px 10px; background: none; color: #c0392b; border: 1px solid #c0392b; border-radius: 4px; cursor: pointer; }
        .btn-del:hover { background: #fde8e8; }
    </style>
</head>
<body>
<div th:replace="~{fragments/layout :: sidebar('admin')}"></div>

<main class="content">
    <h1>Управление пользователями</h1>

    <table class="admin-table">
        <thead>
        <tr>
            <th>ID</th>
            <th>Email</th>
            <th>Роль</th>
            <th>Статус</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="u : ${users}">
            <td th:text="${u.id}" style="color:#999">1</td>
            <td th:text="${u.email}">user@example.com</td>
            <td>
                <span class="role-badge"
                      th:classappend="${u.role == 'ADMIN'} ? 'role-admin' : 'role-user'"
                      th:text="${u.role}">USER</span>
            </td>
            <td>
                <span th:if="${u.verified}"   class="verified-yes">✓ подтверждён</span>
                <span th:unless="${u.verified}" class="verified-no">не подтверждён</span>
            </td>
            <td>
                <div class="row-actions">
                    <form th:if="${u.id != currentUserId}"
                          th:action="@{/admin/users/{id}/role(id=${u.id})}" method="post" style="display:flex;gap:6px">
                        <select name="role">
                            <option value="USER"  th:selected="${u.role == 'USER'}">USER</option>
                            <option value="ADMIN" th:selected="${u.role == 'ADMIN'}">ADMIN</option>
                        </select>
                        <button type="submit" class="btn-ok">OK</button>
                    </form>
                    <form th:if="${u.id != currentUserId}"
                          th:action="@{/admin/users/{id}/delete(id=${u.id})}" method="post"
                          onsubmit="return confirm('Удалить пользователя?')">
                        <button type="submit" class="btn-del">Удалить</button>
                    </form>
                    <span th:if="${u.id == currentUserId}" style="font-size:12px;color:#999">вы</span>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
