<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::main})}">
<body>
<main>
    <h2 class="fw-bold text-dark mb-4">Управление пользователями</h2>

    <div class="card border-0 shadow-sm rounded-4 overflow-hidden bg-white">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th class="ps-4">ID</th>
                    <th>Email</th>
                    <th>Роль</th>
                    <th>Статус</th>
                    <th class="text-end pe-4">Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${users}">
                    <td class="ps-4 text-muted small" th:text="${u.id}">1</td>
                    <td th:text="${u.email}">user@example.com</td>
                    <td>
                        <span class="badge rounded-pill px-2"
                              th:classappend="${u.role == 'ADMIN'} ? 'bg-danger' : 'bg-secondary'"
                              th:text="${u.role}">USER</span>
                    </td>
                    <td>
                        <span th:if="${u.verified}" class="text-success small">✓ подтверждён</span>
                        <span th:unless="${u.verified}" class="text-muted small">не подтверждён</span>
                    </td>
                    <td class="text-end pe-4">
                        <div class="d-flex justify-content-end gap-2">
                            <!-- смена роли -->
                            <form th:action="@{/admin/users/{id}/role(id=${u.id})}" method="post" class="d-flex gap-1">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <select name="role" class="form-select form-select-sm rounded-3" style="width: auto;">
                                    <option value="USER" th:selected="${u.role == 'USER'}">USER</option>
                                    <option value="ADMIN" th:selected="${u.role == 'ADMIN'}">ADMIN</option>
                                </select>
                                <button type="submit" class="btn btn-sm btn-outline-primary rounded-3">OK</button>
                            </form>
                            <!-- удаление -->
                            <form th:action="@{/admin/users/{id}/delete(id=${u.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm btn-outline-danger rounded-3"
                                        onclick="return confirm('Удалить пользователя?')">Удалить</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
