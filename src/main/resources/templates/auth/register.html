<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FinSync - Регистрация</title>
    <link rel="stylesheet" th:href="@{/style.css}" href="/style.css">
</head>
<body class="auth-wrapper">
<meta name="_csrf" th:content="${_csrf.token}"/>
<meta name="_csrf_header" th:content="${_csrf.headerName}"/>
<div class="auth-card">
    <h2>Регистрация</h2>

    <div th:if="${error}" th:text="${error}" style="color: #ff4d4d; margin-bottom: 15px;"></div>

    <form th:action="@{/auth/register}" method="post" class="auth-form-container">
        <p style="margin-bottom: 5px">Введите почту</p>
        <input type="email" id="email" name="email" class="input-styled" required />

        <button type="button" onclick="sendEmailCode()" class="btn-blue"
                style="margin-top: 8px; width: 100%; background-color: #6c757d;">
            Получить код на почту
        </button>

        <p style="margin: 15px 0 5px">Введите пароль</p>
        <input type="password" name="password" class="input-styled" required />

        <p style="margin: 15px 0 5px">Код подтверждения из почты</p>
        <input type="text"
               name="code"
               class="input-styled"
               maxlength="6"
               placeholder="123456"
               required />

        <button type="submit" class="btn-blue" style="margin-top: 20px; width: 100%;">
            Зарегистрироваться
        </button>
    </form>

    <script>
        function sendEmailCode() {
            const email = document.getElementById('email').value.trim();

            if (!email) {
                alert('Введите email!');
                return;
            }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                alert('Введите корректный email (например: user@example.com)');
                return;
            }

            const csrf = document.querySelector('meta[name="_csrf"]').getAttribute('content');

            fetch('/auth/send-code', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'X-CSRF-TOKEN': csrf
                },
                body: 'email=' + encodeURIComponent(email)
            })
                .then(response => {
                    if (response.ok) {
                        alert(' Код успешно отправлен на почту!');
                    } else {
                        return response.text().then(text => {
                            alert(' Ошибка: ' + text);
                        });
                    }
                })
                .catch(err => {
                    console.error('Ошибка:', err);
                    alert('Ошибка сети! Проверьте, запущен ли сервер на localhost:8080');
                });
        }
    </script>

    <div style="margin-top: 15px; text-align: center;">
        <a th:href="@{/auth/login}" style="color: #4a90e2; text-decoration: none;">Уже есть аккаунт? Войти</a>
    </div>
</div>
</body>
</html>
