<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход в систему</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light" style="font-family: 'Segoe UI', system-ui, sans-serif;">
<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card border-0 shadow-sm p-4 bg-white rounded-4" style="width: 100%; max-width: 400px;">
        <h3 class="fw-normal text-center text-secondary mb-4">Вход в FinSync</h3>

        <div th:if="${param.error}" class="alert alert-danger small py-2 rounded-3">
            Неверный email или пароль
        </div>
        <div th:if="${param.logout}" class="alert alert-success small py-2 rounded-3">
            Вы успешно вышли из системы
        </div>

        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="mb-3">
                <label class="form-label small text-muted fw-bold">Электронная почта</label>
                <input type="email" name="username" class="form-control rounded-3" placeholder="user@test.ru" required>
            </div>
            <div class="mb-4">
                <label class="form-label small text-muted fw-bold">Пароль</label>
                <input type="password" name="password" class="form-control rounded-3" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn text-white w-100 py-2 rounded-pill shadow-sm mb-3" style="background-color: #1a237e;">Войти</button>

            <div class="text-center small">
                <span class="text-muted">Ещё нет аккаунта?</span>
                <a th:href="@{/register}" class="text-decoration-none fw-medium" style="color: #1a237e;">Зарегистрироваться</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
