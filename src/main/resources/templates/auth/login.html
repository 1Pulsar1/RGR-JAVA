<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>FinSync - Авторизация</title>
    <link rel="stylesheet" th:href="@{/style.css}" href="/style.css" />
</head>
<body class="auth-wrapper">
<div class="auth-card">
    <h2>Авторизация</h2>

    <form th:action="@{/auth/login}" method="post" class="auth-form-container">
        <p style="margin-bottom: 5px">Введите почту</p>
        <input type="text" name="email" class="input-styled" required />

        <p style="margin: 15px 0 5px">Введите пароль</p>
        <input type="password" name="password" class="input-styled" required />

        <button type="submit" class="btn-blue" style="margin-top: 20px;">
            Войти
        </button>
    </form>

    <div style="margin-top: 15px; text-align: center;">
        <a href="/auth/register" style="color: #4a90e2; text-decoration: none;">Нет аккаунта? Зарегистрироваться</a>
    </div>
</div>
</body>
</html>
