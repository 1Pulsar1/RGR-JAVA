<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::main})}">
<body>
<main>
    <div class="card border-0 shadow-sm p-4 bg-white rounded-4 mx-auto" style="max-width: 500px;">
        <h4 class="fw-bold text-dark mb-4" th:text="${transaction.id == null} ? 'Новая operation' : 'Редактирование операции'">Операция</h4>

        <form th:action="@{/transactions/save}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="id" th:value="${transaction.id}"/>

            <div class="mb-3">
                <label class="form-label small text-muted fw-bold">Описание</label>
                <input type="text" name="description" th:value="${transaction.description}" class="form-control rounded-3" required placeholder="Например: Зарплата или Кафе">
            </div>

            <div class="mb-3">
                <label class="form-label small text-muted fw-bold">Сумма (₽)</label>
                <input type="number" step="0.01" name="amount" th:value="${transaction.amount}" class="form-control rounded-3" required placeholder="0.00">
            </div>

            <div class="mb-3">
                <label class="form-label small text-muted fw-bold">Тип операции</label>
                <select name="type" class="form-select rounded-3" required>
                    <option value="EXPENSE" th:selected="${transaction.type?.name() == 'EXPENSE'}">Расход</option>
                    <option value="INCOME" th:selected="${transaction.type?.name() == 'INCOME'}">Доход</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label small text-muted fw-bold">Категория</label>
                <select name="categoryId" class="form-select rounded-3" required>
                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}" th:selected="${cat.id == transaction.category?.id}">Категория</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label small text-muted fw-bold">Дата операции</label>
                <input type="datetime-local" name="operationDate" th:value="${transaction.operationDate}" class="form-control rounded-3" required>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn text-white px-4 rounded-3" style="background-color: #1a237e;">Сохранить</button>
                <a th:href="@{/transactions}" class="btn btn-light px-4 rounded-3">Отмена</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
