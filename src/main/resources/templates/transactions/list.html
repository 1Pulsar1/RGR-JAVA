<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::main})}">
<body>
<main>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark">История операций</h2>
    </div>

    <div class="card border-0 shadow-sm p-4 bg-white rounded-4 mb-4" style="max-width: 600px;">
        <h5 class="fw-bold text-dark mb-3">Быстрое добавление операции</h5>
        <form th:action="@{/transactions/save}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="mb-2">
                <input type="text" name="description" class="form-control" placeholder="Название (например, Продукты)" required>
            </div>
            <div class="row g-2 mb-2">
                <div class="col-6">
                    <input type="number" step="0.01" name="amount" class="form-control" placeholder="Сумма" required>
                </div>
                <div class="col-6">
                    <select name="categoryId" class="form-select" required>
                        <option value="" disabled selected>Категория</option>
                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}">Категория</option>
                    </select>
                </div>
            </div>
            <div class="row g-2 mb-3">
                <div class="col-6">
                    <select name="type" class="form-select" required>
                        <option value="EXPENSE">Расход</option>
                        <option value="INCOME">Доход</option>
                    </select>
                </div>
                <div class="col-6">
                    <input type="datetime-local" name="operationDate" class="form-control">
                </div>
            </div>
            <button type="submit" class="btn text-white w-100 py-2 fw-medium" style="background-color: #1a237e; border-radius: 8px;">Добавить транзакцию</button>
        </form>
    </div>

    <div class="card border-0 shadow-sm rounded-4 overflow-hidden bg-white">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th class="ps-4">Дата</th>
                    <th>Описание</th>
                    <th>Категория</th>
                    <th class="text-end pe-4">Сумма</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="tx : ${transactions}">
                    <td class="ps-4 text-muted small" th:text="${#temporals.format(tx.operationDate, 'dd.MM.yyyy HH:mm')}">15.05.2026 12:00</td>
                    <td class="fw-medium text-dark" th:text="${tx.description}">Покупка продуктов</td>
                    <td>
                        <span class="badge bg-secondary-subtle text-secondary px-2 py-1 rounded"
                              th:with="currentCat=${#lists.idForArrayOrList(categories) == null} ? null : ${categories.?[id == __${tx.categoryId}__]}"
                              th:text="${currentCat != null and !currentCat.isEmpty()} ? currentCat[0].name : 'Без категории'">
                            Еда
                        </span>
                    </td>
                    <td class="text-end pe-4 fw-bold"
                        th:classappend="${tx.type == 'INCOME'} ? 'text-success' : 'text-danger'"
                        th:text="${tx.type == 'INCOME' ? '+ ' + tx.amount + ' ₽' : '- ' + tx.amount + ' ₽'}">
                        - 500 ₽
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(transactions)}">
                    <td colspan="4" class="text-center text-muted py-4">Операций пока нет. Добавьте первую!</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
