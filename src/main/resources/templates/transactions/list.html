<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FinSync - Мои финансы</title>
    <link rel="stylesheet" th:href="@{/style.css}" href="/style.css">
</head>
<body>
<div th:replace="~{fragments/layout :: sidebar('finances')}"></div>

<main class="content">
    <h1>Мои финансы</h1>
    <div class="finance-layout">

        <div style="flex: 1;">
            <div class="gray-block">
                <div class="finance-search-bar">
                    <input type="text" class="input-styled" id="searchInput" placeholder="ПОИСК" oninput="filterTable()">
                    <select class="input-styled" id="filterCat" onchange="filterTable()">
                        <option value="">категория</option>
                        <option th:each="cat : ${categories}" th:value="${cat.name}" th:text="${cat.name}"></option>
                    </select>
                    <select class="input-styled" id="filterType" onchange="filterTable()">
                        <option value="">тип</option>
                        <option value="INCOME">Доход</option>
                        <option value="EXPENSE">Расход</option>
                    </select>
                    <input type="date" class="input-styled" id="filterDate" onchange="filterTable()">
                </div>

                <table class="finance-table" id="txTable">
                    <thead>
                    <tr>
                        <th class="col-date">Дата</th>
                        <th class="col-name">Название</th>
                        <th class="col-cat">Категория</th>
                        <th class="col-type">Тип</th>
                        <th class="col-sum">Сумма</th>
                        <th class="col-act">Действие</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="tx : ${transactions}"
                        th:attr="data-name=${tx.description},data-cat=${categoryMap[tx.categoryId]},data-type=${tx.type},data-amount=${tx.amount}">
                        <td th:text="${#temporals.format(tx.operationDate, 'dd.MM.yyyy')}">—</td>
                        <td th:text="${tx.description}">—</td>
                        <td th:text="${categoryMap[tx.categoryId] ?: '—'}">—</td>
                        <td th:text="${tx.type == 'INCOME'} ? 'Доход' : 'Расход'">—</td>
                        <td th:text="${tx.amount} + ' ₽'">—</td>
                        <td>
                            <form th:action="@{/transactions/{id}/delete(id=${tx.id})}" method="post" style="display:inline">
                                <button type="submit" class="action-link delete-link">Удалить</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${transactions.empty}">
                        <td colspan="6" style="text-align:center;color:#999;padding:20px">Транзакций пока нет</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="finance-sidebar-panel">
            <div class="gray-block">
                <h4>Быстрое добавление</h4>
                <form th:action="@{/transactions/save}" method="post">
                    <input type="text" class="input-styled" name="description" placeholder="Название" required
                           style="margin-bottom:8px;width:100%;box-sizing:border-box">
                    <div class="quick-add-grid">
                        <input type="number" step="0.01" class="input-styled" name="amount" placeholder="Сумма" required>
                        <select class="input-styled" name="categoryId">
                            <option value="">Категория</option>
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                        </select>
                        <select class="input-styled" name="type" required>
                            <option value="INCOME">Доход</option>
                            <option value="EXPENSE">Расход</option>
                        </select>
                        <input type="datetime-local" class="input-styled" name="operationDate">
                    </div>
                    <button type="submit" class="btn-blue" style="width:100%;margin-top:10px">Добавить</button>
                </form>
            </div>

            <div class="gray-block"
                 style="flex-grow:1;min-height:250px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center">
                <p style="color:#666;font-size:14px;margin-bottom:10px">Расходы по категориям</p>
                <canvas id="categoryChart" width="200" height="200"></canvas>
                <p id="noDataMsg" style="display:none;color:#999;font-size:13px">Расходов пока нет</p>
            </div>
        </div>

    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
    function filterTable() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const cat = document.getElementById('filterCat').value.toLowerCase();
        const type = document.getElementById('filterType').value;
        document.querySelectorAll('#txTable tbody tr[data-type]').forEach(function(row) {
            const name = (row.dataset.name || '').toLowerCase();
            const rowCat = (row.dataset.cat || '').toLowerCase();
            const rowType = row.dataset.type || '';
            const show = (!search || name.includes(search))
                && (!cat || rowCat === cat)
                && (!type || rowType === type);
            row.style.display = show ? '' : 'none';
        });
    }

    (function buildChart() {
        const catTotals = {};
        document.querySelectorAll('#txTable tbody tr[data-type="EXPENSE"]').forEach(function(row) {
            const cat = row.dataset.cat || 'Другое';
            const amount = parseFloat(row.dataset.amount) || 0;
            catTotals[cat] = (catTotals[cat] || 0) + amount;
        });
        const labels = Object.keys(catTotals);
        if (labels.length === 0) {
            document.getElementById('categoryChart').style.display = 'none';
            document.getElementById('noDataMsg').style.display = 'block';
            return;
        }
        new Chart(document.getElementById('categoryChart'), {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: Object.values(catTotals),
                    backgroundColor: ['#3949ab','#5c6bc0','#7986cb','#9fa8da','#c5cae9','#e8eaf6','#283593']
                }]
            },
            options: {
                plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } }
            }
        });
    })();
</script>
</body>
</html>
