<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(mainContent)">
<head>
    <meta charset="UTF-8">
    <title>FinSync — Управление финансами</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', system-ui, sans-serif; }
        .text-income { color: #2e7d32 !important; }
        .text-expense { color: #c62828 !important; }
        .navbar-brand { color: #1a237e !important; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4" th:href="@{/dashboard}">FinSync</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-2">
                <li class="nav-item"><a class="nav-link fw-medium text-dark" th:href="@{/dashboard}">Главная</a></li>
                <li class="nav-item"><a class="nav-link fw-medium text-dark" th:href="@{/transactions}">Операции</a></li>
                <li class="nav-item"><a class="nav-link fw-medium text-dark" th:href="@{/goals}">Цели</a></li>
                <li class="nav-item"><a class="nav-link fw-medium text-dark" th:href="@{/invites}">Приглашения</a></li>
            </ul>
            <div class="d-flex align-items-center">
                <form th:action="@{/logout}" method="post" class="m-0">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-outline-secondary btn-sm rounded-pill px-3">Выйти</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="container">
    <div th:replace="${mainContent}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
