<nav th:fragment="sidebar(activePage)" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" class="sidebar">
    <div class="logo">FinSync</div>
    <ul class="nav-links">
        <li>
            <a th:href="@{/dashboard}"
               th:class="${activePage == 'dashboard' ? 'active' : ''}">
                рабочий стол
            </a>
        </li>
        <li>
            <a th:href="@{/transactions}"
               th:class="${activePage == 'finances' || activePage == 'transactions' ? 'active' : ''}">
                мои финансы
            </a>
        </li>
        <li>
            <a th:href="@{/goals}"
               th:class="${activePage == 'goals' ? 'active' : ''}">
                цели
            </a>
        </li>
        <li>
            <a th:href="@{/invites}"
               th:class="${activePage == 'social' ? 'active' : ''}">
                социальный режим
            </a>
        </li>
        <li th:if="${isAdmin}">
            <a th:href="@{/admin/users}"
               th:class="${activePage == 'admin' ? 'active' : ''}">
                администрирование
            </a>
        </li>
    </ul>

    <div class="footer-link">
        <div style="font-size:12px;color:rgba(255,255,255,0.6);margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"
             th:text="${#authentication.name}">email</div>
        <form th:action="@{/auth/logout}" method="post" style="margin:0">
            <button type="submit" style="background:none;border:none;color:rgba(255,255,255,0.7);cursor:pointer;font-size:14px;padding:0;">
                Выйти →
            </button>
        </form>

</nav>
