<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::main})}">
<body>
<main>
    <div class="card border-0 shadow-sm p-4 bg-white rounded-4 mx-auto" style="max-width: 500px;">
        <h4 class="fw-bold text-dark mb-4"
            th:text="${goal.id == null} ? 'Новая цель' : 'Редактирование цели'">Цель</h4>

        <form th:action="@{/goals/save}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="id" th:value="${goal.id}"/>

            <div class="mb-3">
                <label class="form-label small text-muted fw-bold">Название</label>
                <input type="text" name="title" th:value="${goal.title}"
                       class="form-control rounded-3" required placeholder="Например: Новый ноутбук">
            </div>

            <div class="mb-3">
                <label class="form-label small text-muted fw-bold">Целевая сумма (₽)</label>
                <input type="number" step="0.01" name="targetAmount" th:value="${goal.targetAmount}"
                       class="form-control rounded-3" required placeholder="0.00">
            </div>

            <div class="mb-3">
                <label class="form-label small text-muted fw-bold">Уже накоплено (₽)</label>
                <input type="number" step="0.01" name="currentAmount" th:value="${goal.currentAmount}"
                       class="form-control rounded-3" placeholder="0.00">
            </div>

            <div class="mb-4">
                <label class="form-label small text-muted fw-bold">Дедлайн (необязательно)</label>
                <input type="date" name="deadline" th:value="${goal.deadline}"
                       class="form-control rounded-3">
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn text-white px-4 rounded-3" style="background-color: #1a237e;">Сохранить</button>
                <a th:href="@{/goals}" class="btn btn-light px-4 rounded-3">Отмена</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
