<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FinSync - Цель</title>
    <link rel="stylesheet" th:href="@{/style.css}" href="/style.css">
</head>
<body>
<div th:replace="~{fragments/layout :: sidebar('goals')}"></div>

<main class="content">
    <h1 th:text="${goal.id == null} ? 'Новая цель' : 'Редактирование цели'">Цель</h1>

    <div class="gray-block" style="max-width: 480px">
        <form th:action="@{/goals/save}" method="post" style="display:flex;flex-direction:column;gap:14px">
            <input type="hidden" name="id" th:value="${goal.id}"/>

            <div>
                <small>Название цели</small>
                <input type="text" name="title" th:value="${goal.title}"
                       class="input-styled" required placeholder="Например: Новый ноутбук"
                       style="width:100%;box-sizing:border-box">
            </div>

            <div>
                <small>Целевая сумма (₽)</small>
                <input type="number" step="0.01" name="targetAmount" th:value="${goal.targetAmount}"
                       class="input-styled" required placeholder="0.00"
                       style="width:100%;box-sizing:border-box">
            </div>

            <div>
                <small>Уже накоплено (₽)</small>
                <input type="number" step="0.01" name="currentAmount"
                       th:value="${goal.currentAmount != null ? goal.currentAmount : 0}"
                       class="input-styled" placeholder="0.00"
                       style="width:100%;box-sizing:border-box">
            </div>

            <div>
                <small>Срок (необязательно)</small>
                <input type="date" name="deadline" th:value="${goal.deadline}"
                       class="input-styled" style="width:100%;box-sizing:border-box">
            </div>

            <div style="display:flex;gap:10px;margin-top:4px">
                <button type="submit" class="btn-blue" style="padding:0 24px;height:38px">Сохранить</button>
                <a th:href="@{/goals}" style="height:38px;line-height:38px;padding:0 16px;background:#f0f0f0;border-radius:6px;text-decoration:none;color:#333;font-size:14px">Отмена</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
